version: 2
updates:
  - package-ecosystem: composer
    directories:
      - ./
    versioning-strategy: increase
    cooldown:
      default-days: 10
    open-pull-requests-limit: 10
    schedule:
      interval: weekly
    assignees:
      - korobochkin

  - package-ecosystem: docker
    directories:
      - ./development/containers/php
    cooldown:
      default-days: 10
    open-pull-requests-limit: 5
    schedule:
      interval: weekly
    assignees:
      - korobochkin

  - package-ecosystem: docker-compose
    directories:
      - ./development
    cooldown:
      default-days: 10
    open-pull-requests-limit: 5
    schedule:
      interval: weekly
    assignees:
      - korobochkin

  - package-ecosystem: github-actions
    directories:
      - /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    assignees:
      - korobochkin
