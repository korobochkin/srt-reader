name: Tests

on:
  pull_request:
  push:
    branches:
      - 'main'
      - 'develop'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: '${{ github.ref }}'
  cancel-in-progress: true

permissions: {}

jobs:
  php-syntax:
    name: 'PHP ${{ matrix.php-versions }} Syntax Check'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions:
          - '8.4'
          - '8.5'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up the PHP
        uses: shivammathur/setup-php@v2
        with:
          extensions: none
          tools: none
          ini-file: development
          php-version: ${{ matrix.php-versions }}

      - name: Run PHP Syntax Check
        run: 'make php-syntax'

  php-cs-fixer-check:
    name: 'PHP Coding Standards'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: PHP Coding Standards Cache
        uses: actions/cache@v6
        with:
          path: |
            development/php-cs-fixer/php-cs-fixer.cache
          key: phpcs-${{ github.ref }}
          restore-keys: |
            phpcs-

      - name: Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          cleanup: true

      - name: Docker Bake
        uses: docker/bake-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          files: development/docker-compose-tests.yml
          source: ./
          targets: php-cs-fixer

      - name: Docker Compose Up. PHP Coding Standards
        run: make up-php-cs-fixer

      - name: Docker Compose Down
        if: always()
        run: make down-tests

  psalm:
    name: Psalm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Psalm Cache
        uses: actions/cache@v6
        with:
          path: development/psalm/.cache
          key: psalm-cache
          restore-keys: psalm-cache

      - name: Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          cleanup: true

      - name: Docker Bake
        uses: docker/bake-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          files: development/docker-compose-tests.yml
          source: ./
          targets: psalm

      - name: Docker Compose Up. Psalm
        run: make up-psalm

      - name: Docker Compose Down
        if: always()
        run: make down-tests

  tests-integration:
    name: Tests Integration
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Tests Integration Cache
        uses: actions/cache@v6
        with:
          path: tests/integration/.cache
          key: tests-integration-cache
          restore-keys: tests-integration-cache

      - name: Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          cleanup: true

      - name: Docker Bake
        uses: docker/bake-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          files: development/docker-compose-tests.yml
          source: ./
          targets: tests-runner-integration

      - name: Docker Compose Up. Tests Integration
        run: make up-tests-integration

      - name: Docker Compose Down
        if: always()
        run: make down-tests

  tests-unit:
    name: Tests Unit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Tests Unit Cache
        uses: actions/cache@v6
        with:
          path: tests/unit/.cache
          key: tests-unit-cache
          restore-keys: tests-unit-cache

      - name: Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4
        with:
          cleanup: true

      - name: Docker Bake
        uses: docker/bake-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          files: development/docker-compose-tests.yml
          source: ./
          targets: tests-runner-unit

      - name: Docker Compose Up. Tests Unit
        run: make up-tests-unit

      - name: Docker Compose Down
        if: always()
        run: make down-tests
