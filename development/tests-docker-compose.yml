---
services:
  tests-runner:
    build:
      dockerfile: ./development/php/Dockerfile
      context: .
      target: base
      x-bake:
        output:
          - type=docker
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    tty: true
    volumes:
      - ./../:/root/app
      - ./../tmp/composer:/root/.composer
