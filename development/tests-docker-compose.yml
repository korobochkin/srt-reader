---
name: srt-reader
services:
  tests-runner:
    build:
      dockerfile: ./development/php/Dockerfile
      context: .
      target: base
      args:
        UID: 1001
        GID: 1001
      x-bake:
        output:
          - type=docker
      cache_from:
        - type=gha
      cache_to:
        - type=gha,mode=max
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges=true
    read_only: true
    init: true
    tty: true
    user: 1001:1001
    volumes:
      - ./../:/root/app
      - ./../tmp/composer:/root/.composer
    tmpfs:
      - /tmp
      - /run
