---
name: srt-reader
services:
  php:
    build:
      dockerfile: ./development/containers/php/Dockerfile
      context: ./../
      target: develop
      args:
        UID: 82
        GID: 82
      provenance: false
      sbom: false
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges=true
    read_only: true
    init: true
    tty: true
    configs:
      - source: php_xdebug
        target: /usr/local/etc/php/conf.d/xdebug.ini
        uid: '82'
        gid: '82'
        mode: 0400
    volumes:
      - ./../:/home/www-data/app
      - ./../tmp/composer:/home/www-data/.composer
    tmpfs:
      - /tmp
      - /run

configs:
  php_xdebug:
    file: ./containers/php/xdebug.ini
