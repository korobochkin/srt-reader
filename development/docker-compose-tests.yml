---

x-php: &service-php
  build: &service-php-build
    dockerfile: ./development/containers/php/Dockerfile
    context: .
    target: base
    args:
      UID: 82
      GID: 82
    x-bake:
      output:
        - type=docker
    cache_from:
      - type=gha
    cache_to:
      - type=gha,mode=max
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges=true
  read_only: true
  user: 82:82
  volumes:
    - ./../source:/home/www-data/app/source:read-only
    - ./../tests:/home/www-data/app/tests:read-only
    - ./../Makefile:/home/www-data/app/Makefile:read-only
  tmpfs:
    - /tmp
    - /run

name: srt-reader
services:
  tests-runner-integration:
    <<: *service-php
    build:
      <<: *service-php-build
      target: tests-runner-integration
      tags:
        - srt-reader-tests-runner-integration:latest

  tests-runner-unit:
    <<: *service-php
    build:
      <<: *service-php-build
      target: tests-runner-unit
      tags:
        - srt-reader-tests-runner-unit:latest

  psalm:
    <<: *service-php
    build:
      <<: *service-php-build
      target: psalm
      tags:
        - srt-reader-psalm:latest
    volumes:
      - ./../development:/home/www-data/app/development
      - ./../grammar:/home/www-data/app/grammar:read-only
      - ./../source:/home/www-data/app/source:read-only
      - ./../tests:/home/www-data/app/tests:read-only
      - ./../Makefile:/home/www-data/app/Makefile:read-only

  php-cs-fixer:
    <<: *service-php
    build:
      <<: *service-php-build
      target: php-cs-fixer
      tags:
        - srt-reader-php-cs-fixer:latest
    environment:
      GITHUB_ACTIONS: ${GITHUB_ACTIONS:-false}
    volumes:
      - ./../development:/home/www-data/app/development
      - ./../grammar:/home/www-data/app/grammar:read-only
      - ./../source:/home/www-data/app/source:read-only
      - ./../tests:/home/www-data/app/tests:read-only
      - ./../Makefile:/home/www-data/app/Makefile:read-only
      - ./../composer.json:/home/www-data/app/composer.json:read-only
      - ./../composer.lock:/home/www-data/app/composer.lock:read-only
